name: Run Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt to run with Pi
        required: true
        type: string
      target_owner:
        description: Owner to mint the GitHub App token for
        required: false
        type: string
      target_repository:
        description: Repository to mint the GitHub App token for
        required: false
        type: string
      model:
        description: Model to run with Pi
        required: false
        type: string

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Pi
        run: npm install -g @earendil-works/pi-coding-agent

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: 4042273
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.target_owner || github.repository_owner }}
          repositories: ${{ inputs.target_repository || github.event.repository.name }}

      - name: Expose GitHub Actions runtime
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Run Pi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PALANTIR_API_KEY: ${{ secrets.PALANTIR_API_KEY }}
          CROFAI_API_KEY: ${{ secrets.CROFAI_API_KEY }}
          PI_CODING_AGENT_DIR: ${{ github.workspace }}/.pi
          PI_SKIP_VERSION_CHECK: 1
          PI_TELEMETRY: 0
          MODEL: ${{ inputs.model }}
          PROMPT: ${{ inputs.prompt }}
        run: |
          args=(--no-session)

          if [[ -n "$MODEL" ]]; then
            args+=(--model "$MODEL")
          fi

          pi "${args[@]}" -p "$PROMPT"
